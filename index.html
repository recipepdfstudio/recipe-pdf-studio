<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe PDF Studio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

.header {
  background: #1f6f3b;
  color: white;
  padding: 15px;
  font-size: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  min-width: 300px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

textarea {
  height: 80px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  cursor: pointer;
  color: white;
}

.add { background: #2f9e44; }
.pdf { background: #1976d2; }

.recipe {
  background: #eee;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
}

.btns {
  display: flex;
  gap: 5px;
  margin-top: 8px;
}

.edit { background: #1c7ed6; }
.delete { background: #e03131; }
.undo { background: orange; margin-top: 10px; }
</style>
</head>

<body>

<div class="header">🍲 Recipe PDF Studio</div>

<div class="container">

<!-- FORM -->
<div class="card">
<h3>Create Recipe</h3>

<input id="title" placeholder="Title">
<textarea id="ingredients" placeholder="Ingredients"></textarea>
<textarea id="steps" placeholder="Steps"></textarea>

<button class="add" onclick="saveRecipe()">Save / Update</button>
<button class="pdf" onclick="generatePDF()">Download PDF</button>
</div>

<!-- LIST -->
<div class="card">
<h3>My Recipes</h3>

<div id="list"></div>
<button id="undoBtn" class="undo" onclick="undoDelete()" style="display:none;">Undo Delete</button>
</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
let editingId = null;
let lastDeleted = null;

function saveData() {
  localStorage.setItem("recipes", JSON.stringify(recipes));
  render();
}

function saveRecipe() {
  const title = document.getElementById("title").value;
  const ingredients = document.getElementById("ingredients").value;
  const steps = document.getElementById("steps").value;

  if (!title) return alert("Add title");

  if (editingId) {
    const index = recipes.findIndex(r => r.id === editingId);
    recipes[index] = { id: editingId, title, ingredients, steps };
    editingId = null;
  } else {
    recipes.push({ id: Date.now(), title, ingredients, steps });
  }

  clearForm();
  saveData();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  recipes.forEach(r => {
    list.innerHTML += `
      <div class="recipe">
        <b>${r.title}</b>

        <div class="btns">
          <button class="edit" onclick="editRecipe(${r.id})">Edit</button>
          <button class="delete" onclick="deleteRecipe(${r.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

function editRecipe(id) {
  const r = recipes.find(x => x.id === id);

  document.getElementById("title").value = r.title;
  document.getElementById("ingredients").value = r.ingredients;
  document.getElementById("steps").value = r.steps;

  editingId = id;
}

function deleteRecipe(id) {
  const index = recipes.findIndex(r => r.id === id);
  lastDeleted = recipes[index];

  recipes.splice(index, 1);
  document.getElementById("undoBtn").style.display = "block";

  saveData();
}

function undoDelete() {
  if (lastDeleted) {
    recipes.push(lastDeleted);
    lastDeleted = null;
    saveData();
    document.getElementById("undoBtn").style.display = "none";
  }
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("ingredients").value = "";
  document.getElementById("steps").value = "";
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  recipes.forEach(r => {
    doc.text(r.title, 10, y);
    y += 10;
  });

  doc.save("recipes.pdf");
}

render();

</script>

</body>
</html>
