<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RecipePDFStudio</title>

  <link rel="stylesheet" href="style.css">

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

  <div class="app">
    <div class="card">

      <h1>🍳 RecipePDFStudio</h1>

      <input id="title" placeholder="Recipe Title" />

      <textarea id="ingredients" placeholder="Ingredients (one per line)"></textarea>

      <textarea id="instructions" placeholder="Instructions"></textarea>

      <!-- Buttons -->
      <button onclick="addRecipe()">➕ Add Recipe</button>
      <button onclick="generatePDF()">📄 Download Cookbook PDF</button>

      <!-- Recipe list -->
      <ul id="recipeList"></ul>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
