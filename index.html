<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RecipePDFStudio</title>

  <link rel="stylesheet" href="style.css">

  <!-- PDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

  <div class="app">
    <div class="card">

      <h1>🍳 RecipePDFStudio</h1>

      <input id="title" placeholder="Recipe Title" />

      <textarea id="ingredients" placeholder="Ingredients (one per line)"></textarea>

      <textarea id="instructions" placeholder="Instructions"></textarea>

      <button onclick="generatePDF()">Download PDF</button>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
